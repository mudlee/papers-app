<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papers! - Support</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: #ffffff;
            border-radius: 16px;
            padding: 48px 40px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 16px;
            color: #6e6e73;
            margin-bottom: 32px;
        }

        .info {
            font-size: 17px;
            margin-bottom: 24px;
        }

        .email-link {
            display: inline-block;
            font-size: 17px;
            font-weight: 600;
            color: #007aff;
            text-decoration: none;
        }

        .email-link:hover {
            text-decoration: underline;
        }

        .response-time {
            margin-top: 24px;
            font-size: 14px;
            color: #6e6e73;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Papers! Support</h1>
        <p class="subtitle">We're here to help.</p>
        <p class="info">Support is provided via email. Please send your questions, feedback, or issue reports to:</p>
        <a class="email-link" href="mailto:outofrangestudio@tutanota.de">outofrangestudio@tutanota.de</a>
        <p class="response-time">We typically respond within 3&ndash;4 business days.</p>
    </div>
</body>
</html>
